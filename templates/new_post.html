{% extends "base.html" %}
{% block title %} New Post {% endblock %}
{% block content %}
    <h2>New Post</h2>
    <form method="post" class="row" style="max-width:720px;">
      <div>
        <label for="title">Title</label>
        <input id="title" name="title" placeholder="Post title" required>
      </div>
      <div>
        <label for="body">Body</label>
        <textarea id="body" name="body" rows="8" placeholder="Write your post…" required></textarea>
      </div>
      <div>
        <button class="btn btn-primary" type="submit">Publish</button>
      </div>
    </form>
{% endblock %}
